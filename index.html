<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tech Wave Code Follower UI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/locomotive-scroll@4.1.4/dist/locomotive-scroll.min.css">
  <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@4.1.4/dist/locomotive-scroll.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <style>
    html, body {
      margin:0;
      padding:0;
      width:100vw;
      height:100vh;
      overflow:hidden;
      background:#181d24;
    }
    .scroll-container {
      position:relative;
      width:100vw; height:100vh; overflow:hidden;
    }
    canvas {display:block;position:absolute;top:0;left:0;width:100vw;height:100vh;z-index:0;}
  </style>
</head>
<body>
  <div data-scroll-container class="scroll-container">
    <canvas id="bg"></canvas>
  </div>
  <script>
    // Locomotive Scroll Setup
    let scroll = new LocomotiveScroll({
      el: document.querySelector('.scroll-container'),
      smooth: true,
      lerp: 0.08
    });

    // Canvas Initialization
    const canvas = document.getElementById('bg'),
          ctx = canvas.getContext('2d');
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Colors: tech palette
    const COLORS = ["#44dfb6", "#e75b95", "#81eefd", "#b9a2fd", "#fbda61", "#ff8056", "#fc526b", "#ffdd35"];
    function rc() { return COLORS[(Math.random()*COLORS.length)|0]; }
    function rand(a,b){return Math.random()*(b-a)+a;}
    function randInt(a,b){return Math.floor(rand(a,b+1));}

    // Mouse position and inertia
    let mouse = {x: canvas.width/2, y: canvas.height/2};
    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    // --- OCD/Structured Shape Distribution ---
    // Place SHAPES on a circle/ellipse formation centered on canvas
    function getCenters(n, radiusX, radiusY, offset=0) {
      let arr = [], cx = canvas.width/2, cy = canvas.height/2;
      for(let i=0;i<n;i++){ 
        let angle = offset + i*2*Math.PI/n;
        arr.push({
          x: cx + Math.cos(angle)*radiusX,
          y: cy + Math.sin(angle)*radiusY,
          angle
        });
      }
      return arr;
    }

    // Central UI snaky path generator, curved around its own structured center
    function makePath(cx,cy,mag,phase,mouseEffect = 1) {
      let pts=[];
      let segs=42;
      for(let i=0;i<segs;i++){
        let a = i/segs*2*Math.PI;
        let mx = mouse.x - cx, my = mouse.y - cy;
        let mInfluence = mouseEffect * Math.exp(-((mx*mx+my*my)/(canvas.width*canvas.height/3)));
        let r = mag*(0.97+0.13*Math.sin(a*2 + phase) + 0.05*Math.cos(a*8 + phase)) + mInfluence * Math.sin(a+phase*2) * 22;
        pts.push([
          cx + Math.cos(a)*r + Math.sin(a+phase)*14 + mInfluence * Math.cos(a-phase)*5,
          cy + Math.sin(a)*r + Math.cos(a*.7+phase)*15 + mInfluence * Math.sin(a+phase)*5
        ]);
      }
      return pts;
    }

    // Structured Shapes
    let structuredCenters = getCenters(10, canvas.width/3, canvas.height/3, Math.PI/10);

    let SHAPES = [];
    function makeShape(idx){
      let centerObj = structuredCenters[idx % structuredCenters.length];
      let mag = canvas.width/7 + 40 + 25*Math.cos(centerObj.angle*2 + Date.now()/25000);
      let phase = rand(0,Math.PI*2);
      let color = COLORS[idx % COLORS.length];
      let speed = 0.003;
      return {
        cx: centerObj.x, cy: centerObj.y, mag, phase, speed, color,
        time: Date.now()+idx*999,
        path: makePath(centerObj.x, centerObj.y, mag, phase, 0),
        opacity: 0.27 + ((idx%3)*0.13),
        linew: 2.2 + (idx%3),
        wiggle: 1 + ((idx%2)*0.5),
        impact: 1
      }
    }

    SHAPES = [];
    for(let i=0; i<structuredCenters.length; i++) SHAPES.push(makeShape(i));

    // --- OCD/Structured Code Shapes Distribution (Grid) ---
    let codeGrid = [];
    let gridRows = 4, gridCols = 4;
    let paddingX = canvas.width/(gridCols+1), paddingY = canvas.height/(gridRows+1);
    for(let r=1; r<=gridRows; r++) {
      for(let c=1; c<=gridCols; c++) {
        codeGrid.push({
          x: c*paddingX,
          y: r*paddingY,
          idx: (r-1)*gridCols + (c-1)
        });
      }
    }

    // Structured Code Shapes
    let CODES = [];
    function makeCodeShape(obj){
      let len = 64 + 16*Math.sin(obj.idx+Date.now()/10000);
      let ang = Math.PI/4 + (obj.idx%gridCols)/gridCols*Math.PI;
      let type = ["bracket","snippet","trace"][obj.idx%3];
      let color = COLORS[obj.idx % COLORS.length];
      return {
        x: obj.x, y: obj.y, len, ang, type, color, phase:Math.PI/3 + obj.idx*0.11, opacity:0.42, linew:1.8,
        follow: 1.08
      }
    }

    CODES = [];
    for(let i=0; i<codeGrid.length; i++) CODES.push(makeCodeShape(codeGrid[i]));

    // DRAW BUGS BUNNY FUNCTION
    function drawBugsBunny(ctx, x, y, scale=1) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);
      ctx.lineWidth = 5;
      ctx.strokeStyle = "#bbbbbb";
      ctx.beginPath();
      ctx.moveTo(0,-60);
      ctx.bezierCurveTo(-10,-110, -25,-170, -8,-230);
      ctx.bezierCurveTo(0,-175, 22,-110, 12,-60);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(30,-55);
      ctx.bezierCurveTo(36,-105, 54,-160, 34,-220);
      ctx.bezierCurveTo(30,-170, 15,-105, 20,-60);
      ctx.stroke();

      ctx.lineWidth = 8;
      ctx.strokeStyle = "#bbbbbb";
      ctx.beginPath();
      ctx.ellipse(13, 0, 40, 46, 0, Math.PI*1.2, Math.PI*2.7);
      ctx.ellipse(0, 0, 40, 46, 0, Math.PI*0.3, Math.PI*1.8);
      ctx.stroke();

      ctx.lineWidth = 4;
      ctx.strokeStyle = "#a8717d";
      ctx.beginPath();
      ctx.arc(10, 10, 9, 0, Math.PI*2);
      ctx.stroke();

      ctx.lineWidth = 3;
      ctx.strokeStyle = "#775751";
      ctx.beginPath();
      ctx.arc(13, 23, 16, Math.PI*0.15, Math.PI*0.95);
      ctx.stroke();

      ctx.lineWidth = 4;
      ctx.strokeStyle = "#fff";
      ctx.beginPath();
      ctx.moveTo(10,28);
      ctx.lineTo(10,42);
      ctx.moveTo(20,28);
      ctx.lineTo(20,42);
      ctx.stroke();

      ctx.restore();
    }

    // Animation Loop
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      let scrollY = scroll.scroll.instance?.scroll.y||0;
      let scrollX = scroll.scroll.instance?.scroll.x||0;

      // --- Draw structured main shapes ---
      for(let i=0;i<SHAPES.length;i++){
        let s = SHAPES[i];
        s.phase += s.speed * s.wiggle;
        let newCx = s.cx + Math.sin(Date.now()/1300 + s.phase + i)*8;
        let newCy = s.cy + Math.cos(Date.now()/1100 + s.phase + i)*8;
        s.path = makePath(newCx,newCy,s.mag,s.phase,1);
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(s.path[0][0],s.path[0][1]);
        for(let j=1;j<s.path.length;j++)
          ctx.lineTo(s.path[j][0],s.path[j][1]);
        ctx.closePath();
        ctx.globalAlpha = s.opacity;
        ctx.strokeStyle = s.color;
        ctx.shadowColor = s.color;
        ctx.shadowBlur = 15;
        ctx.lineWidth = s.linew;
        ctx.stroke();
        ctx.globalAlpha = s.opacity * .35;
        for(let p=0;p<s.path.length;p+=12){
          ctx.beginPath();
          ctx.moveTo(s.path[p][0],s.path[p][1]);
          let q = (p+13)%s.path.length;
          ctx.lineTo(s.path[q][0],s.path[q][1]);
          ctx.lineWidth = s.linew * .8;
          ctx.strokeStyle = s.color;
          ctx.shadowBlur = 8;
          ctx.stroke();
        }
        ctx.restore();
      }

      // --- Draw OCD code shapes in grid pattern ---
      for(let i=0;i<CODES.length;i++){ 
        let c = CODES[i];
        let gridObj = codeGrid[i];
        let dx = mouse.x-c.x, dy = mouse.y-c.y;
        let dist = Math.sqrt(dx*dx+dy*dy);
        let mouseInfluence = 1 + Math.cos(Date.now()/1000+i)*0.05;
        anime({
          targets: c,
          x: gridObj.x + dx * 0.04 * c.follow * mouseInfluence,
          y: gridObj.y + dy * 0.04 * c.follow * mouseInfluence,
          ang: c.ang + Math.sin(Date.now()/400 + i)*.05,
          duration:400, easing:'easeInOutSine'
        });
        ctx.save();
        ctx.globalAlpha = c.opacity * (dist<305?1:0.8);
        ctx.strokeStyle = c.color;
        ctx.shadowColor = c.color;
        ctx.shadowBlur = dist<200?16:4;
        ctx.lineWidth = c.linew;
        if(c.type==="bracket"){
          ctx.beginPath();
          let lw = c.len;
          ctx.moveTo(c.x - lw/2, c.y - lw/2);
          ctx.lineTo(c.x - lw/2, c.y + lw/2);
          ctx.moveTo(c.x + lw/2, c.y - lw/2);
          ctx.lineTo(c.x + lw/2, c.y + lw/2);
          ctx.stroke();
        }else if(c.type==="snippet"){
          ctx.beginPath();
          let lx = Math.cos(c.ang)*c.len/2, ly = Math.sin(c.ang)*c.len/2;
          ctx.moveTo(c.x-lx, c.y-ly);
          ctx.lineTo(c.x+lx, c.y+ly);
          for(let s=-1;s<=1;s+=2){
            ctx.moveTo(c.x+lx*s, c.y+ly*s);
            ctx.lineTo(c.x+lx*s+ly*0.12, c.y+ly*s-lx*0.12);
          }
          ctx.stroke();
        }else if(c.type==="trace"){
          ctx.beginPath();
          let segs=8;
          let prevX = c.x, prevY = c.y;
          for(let j=1;j<=segs;j++){ 
            let a = c.ang + j/2+Math.sin(Date.now()/1200+j+c.x)*.09;
            let rad = c.len/2 * (1-(j/segs)*.54) + dist/340;
            let nextX = prevX + Math.cos(a)*rad, nextY = prevY + Math.sin(a)*rad;
            ctx.lineTo(nextX, nextY);
            prevX = nextX; prevY = nextY;
          }
          ctx.stroke();
        }
        ctx.restore();
      }

      // ---- DRAW BUGS BUNNY ----
      drawBugsBunny(ctx, 110, 130, 1.1);
      drawBugsBunny(ctx, mouse.x*0.8+55, mouse.y*0.65+40, 0.72);
    }

    // Animation Frame
    function loop(){ draw(); requestAnimationFrame(loop); }
    loop();

    // Responsive: Structured shapes follow viewport size
    window.addEventListener('resize', ()=>{
      resize();
      structuredCenters = getCenters(10, canvas.width/3, canvas.height/3, Math.PI/10);
      SHAPES = [];
      for(let i=0; i<structuredCenters.length; i++) SHAPES.push(makeShape(i));
      codeGrid = [];
      paddingX = canvas.width/(gridCols+1); paddingY = canvas.height/(gridRows+1);
      for(let r=1; r<=gridRows; r++) {
        for(let c=1; c<=gridCols; c++) {
          codeGrid.push({
            x: c*paddingX,
            y: r*paddingY,
            idx: (r-1)*gridCols + (c-1)
          });
        }
      }
      CODES = [];
      for(let i=0; i<codeGrid.length; i++) CODES.push(makeCodeShape(codeGrid[i]));
    });
  </script>
</body>
</html>
